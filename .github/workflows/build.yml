name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK (with pre-installed SDK)
      run: |
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        
    - name: Accept Android Licenses
      run: |
        sudo chown -R $USER:$USER /usr/local/lib/android/sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
    - name: Install SDK components
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.1" || true
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      timeout-minutes: 30
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: TermuxToolsInfo-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: ignore
